<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f3f4f6; }
    .login-card { width: 320px; background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,.1); }
    .login-card h1 { margin: 0 0 16px; font-size: 22px; }
    .login-card label { font-size: 14px; margin-top: 10px; display: block; }
    .login-card input { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #ccc; border-radius: 6px; }
    .login-card button { margin-top: 16px; width: 100%; padding: 10px; border: none; background: #2563eb; color: #fff; border-radius: 6px; font-weight: bold; cursor: pointer; }
    .login-card button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Login</h1>
    <form>
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" required />
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" required />
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
