<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FarmersHub - User Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<header class="dash-header">
  <img src="logo.png" alt="Logo" class="dash-logo">
  <h1>FarmersHub — User Data Dashboard</h1>
</header>

<main class="dash-main">
  <!-- Tab Buttons -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tabFarmers">🌾 Farmers</button>
    <button class="tab-btn" id="tabCustomers">🛒 Customers</button>
  </div>

  <!-- Farmers Table -->
  <section class="table-section" id="farmersSection">
    <h2>Registered Farmers</h2>
    <div class="table-wrap">
      <table id="farmersTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Address</th>
            <th>Contact</th>
            <th>Payment Method</th>
            <th>Registered</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <p class="empty-msg" id="farmersEmpty">No farmers registered yet.</p>
  </section>

  <!-- Customers Table -->
  <section class="table-section hidden" id="customersSection">
    <h2>Registered Customers</h2>
    <div class="table-wrap">
      <table id="customersTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Address</th>
            <th>Contact</th>
            <th>Payment Method</th>
            <th>Registered</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <p class="empty-msg" id="customersEmpty">No customers registered yet.</p>
  </section>
</main>

<script src="dashboard.js"></script>
</body>
</html>
