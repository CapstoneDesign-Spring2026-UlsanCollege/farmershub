<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FarmersHub Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Link external CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Decorative background elements -->
<div class="bg-decor">
  <svg class="leaf leaf-1" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 95 C20 80, 5 50, 10 20 C30 35, 55 45, 50 95Z" fill="rgba(56,142,60,0.35)"/>
    <line x1="50" y1="95" x2="28" y2="40" stroke="rgba(56,142,60,0.5)" stroke-width="1.5"/>
  </svg>
  <svg class="leaf leaf-2" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 95 C80 80, 95 50, 90 20 C70 35, 45 45, 50 95Z" fill="rgba(104,159,56,0.3)"/>
    <line x1="50" y1="95" x2="72" y2="40" stroke="rgba(104,159,56,0.45)" stroke-width="1.5"/>
  </svg>
  <svg class="leaf leaf-3" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <path d="M60 110 C10 90, 5 40, 30 10 C50 45, 70 55, 60 110Z" fill="rgba(76,175,80,0.25)"/>
    <line x1="60" y1="110" x2="38" y2="45" stroke="rgba(76,175,80,0.4)" stroke-width="2"/>
  </svg>
  <svg class="leaf leaf-4" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 95 C20 80, 5 50, 10 20 C30 35, 55 45, 50 95Z" fill="rgba(129,199,132,0.3)"/>
    <line x1="50" y1="95" x2="28" y2="40" stroke="rgba(129,199,132,0.45)" stroke-width="1.5"/>
  </svg>
  <svg class="wheat wheat-1" viewBox="0 0 40 120" xmlns="http://www.w3.org/2000/svg">
    <line x1="20" y1="120" x2="20" y2="10" stroke="rgba(139,195,74,0.5)" stroke-width="2"/>
    <ellipse cx="20" cy="10" rx="6" ry="14" fill="rgba(174,213,129,0.45)"/>
    <ellipse cx="12" cy="30" rx="5" ry="11" fill="rgba(174,213,129,0.35)" transform="rotate(-30 12 30)"/>
    <ellipse cx="28" cy="30" rx="5" ry="11" fill="rgba(174,213,129,0.35)" transform="rotate(30 28 30)"/>
    <ellipse cx="14" cy="52" rx="4" ry="9" fill="rgba(174,213,129,0.3)" transform="rotate(-25 14 52)"/>
    <ellipse cx="26" cy="52" rx="4" ry="9" fill="rgba(174,213,129,0.3)" transform="rotate(25 26 52)"/>
  </svg>
  <svg class="wheat wheat-2" viewBox="0 0 40 120" xmlns="http://www.w3.org/2000/svg">
    <line x1="20" y1="120" x2="20" y2="10" stroke="rgba(139,195,74,0.45)" stroke-width="2"/>
    <ellipse cx="20" cy="10" rx="6" ry="14" fill="rgba(174,213,129,0.4)"/>
    <ellipse cx="12" cy="30" rx="5" ry="11" fill="rgba(174,213,129,0.3)" transform="rotate(-30 12 30)"/>
    <ellipse cx="28" cy="30" rx="5" ry="11" fill="rgba(174,213,129,0.3)" transform="rotate(30 28 30)"/>
    <ellipse cx="14" cy="52" rx="4" ry="9" fill="rgba(174,213,129,0.25)" transform="rotate(-25 14 52)"/>
    <ellipse cx="26" cy="52" rx="4" ry="9" fill="rgba(174,213,129,0.25)" transform="rotate(25 26 52)"/>
  </svg>
</div>

<div class="container">
  <div class="header-row">
    <h2 id="title">Farmers Hub</h2>
    <img src="logo.png" alt="FarmersHub Logo" class="logo" width="100" height="100" id="logo">
  </div>

  <form id="form">
    <input type="email" id="email" placeholder="Enter email" required>
    <input type="password" id="password" placeholder="Enter password" required>

    <div id="confirmBox" style="display:none;">
      <input type="password" id="confirmPassword" placeholder="Confirm password">
    </div>

    <button type="submit" id="btn">Login</button>
  </form>

  <div class="toggle" onclick="switchForm()">
    Don't have an account? Sign Up
  </div>

  <div id="msg" class="message"></div>
</div>

<script src="login.js"></script>

</body>
</html>
