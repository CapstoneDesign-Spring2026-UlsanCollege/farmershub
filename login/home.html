<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FarmersHub Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Link external CSS -->
  <link rel="stylesheet" href="home.css">
</head>

<body>

<header class="home-header">
  <img src="logo.png" alt="FarmersHub Logo" class="home-logo" id="homeLogo" />
  <h1>FarmersHub</h1>
</header>

<!-- Falling leaves/crops canvas -->
<canvas id="fallingCanvas"></canvas>

<!-- Decorative background elements -->
<div class="bg-decor">
  <svg class="leaf leaf-1" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 95 C20 80, 5 50, 10 20 C30 35, 55 45, 50 95Z"/>
    <line x1="50" y1="95" x2="28" y2="40"/>
  </svg>
  <svg class="leaf leaf-2" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 95 C80 80, 95 50, 90 20 C70 35, 45 45, 50 95Z"/>
    <line x1="50" y1="95" x2="72" y2="40"/>
  </svg>
  <svg class="leaf leaf-3" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <path d="M60 110 C10 90, 5 40, 30 10 C50 45, 70 55, 60 110Z"/>
    <line x1="60" y1="110" x2="38" y2="45"/>
  </svg>
  <svg class="leaf leaf-4" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 95 C20 80, 5 50, 10 20 C30 35, 55 45, 50 95Z"/>
    <line x1="50" y1="95" x2="28" y2="40"/>
  </svg>
  <svg class="wheat wheat-1" viewBox="0 0 40 120" xmlns="http://www.w3.org/2000/svg">
    <line x1="20" y1="120" x2="20" y2="10"/>
    <ellipse cx="20" cy="10" rx="6" ry="14"/>
    <ellipse cx="12" cy="30" rx="5" ry="11" transform="rotate(-30 12 30)"/>
    <ellipse cx="28" cy="30" rx="5" ry="11" transform="rotate(30 28 30)"/>
    <ellipse cx="14" cy="52" rx="4" ry="9" transform="rotate(-25 14 52)"/>
    <ellipse cx="26" cy="52" rx="4" ry="9" transform="rotate(25 26 52)"/>
  </svg>
  <svg class="wheat wheat-2" viewBox="0 0 40 120" xmlns="http://www.w3.org/2000/svg">
    <line x1="20" y1="120" x2="20" y2="10"/>
    <ellipse cx="20" cy="10" rx="6" ry="14"/>
    <ellipse cx="12" cy="30" rx="5" ry="11" transform="rotate(-30 12 30)"/>
    <ellipse cx="28" cy="30" rx="5" ry="11" transform="rotate(30 28 30)"/>
    <ellipse cx="14" cy="52" rx="4" ry="9" transform="rotate(-25 14 52)"/>
    <ellipse cx="26" cy="52" rx="4" ry="9" transform="rotate(25 26 52)"/>
  </svg>
</div>

<script src="home.js"></script>

</body>
</html>
